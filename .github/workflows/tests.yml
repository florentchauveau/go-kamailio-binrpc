name: Run Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    name: Run Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -v ./...

      - name: Check formatting
        run: test -z "$(gofmt -l .)"
